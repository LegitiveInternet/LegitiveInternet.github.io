<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Inter',system-ui,-apple-system,'Roboto',monospace;-webkit-tap-highlight-color:transparent}
        body{background:linear-gradient(135deg,#1a0303 0%,#2d0a0a 50%,#1a0303 100%);color:#f0e0e0;padding:.8rem;min-height:100vh}
        .container{max-width:1400px;margin:0 auto}
        .mono-header{background:#1f0505;border-bottom:3px solid #c0392b;border-radius:1.5rem 1.5rem 1rem 1rem;padding:.8rem 1rem;margin-bottom:1.2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;box-shadow:0 8px 20px rgba(180,30,30,.3)}
        .logo h1{font-size:1.4rem;letter-spacing:1px;font-weight:700;font-variant:small-caps;font-family:'Segoe UI','Playfair Display','Georgia',serif;background:linear-gradient(135deg,#ff6b6b,#c0392b,#ff9999);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 12px rgba(220,40,40,.4)}
        .logo p{font-size:.6rem;color:#e0a0a0;letter-spacing:1px;margin-top:2px}
        .rank-badge{background:#2a0a0a;padding:.3rem .8rem;border-radius:2rem;border-left:3px solid #e74c3c;font-weight:bold;font-size:.75rem;color:#ffcccc;box-shadow:0 0 8px rgba(200,40,40,.3)}

        .card h2{border-left:4px solid #e74c3c;padding-left:.7rem;margin-bottom:.8rem;font-weight:600;font-size:1.2rem;color:#ffdddd}
        input,textarea,select{width:100%;background:#2a0f0f;border:1px solid #aa3a3a;padding:.7rem .9rem;border-radius:1rem;color:#ffe0e0;font-size:.9rem;margin-bottom:.8rem}
        input:focus,textarea:focus,select:focus{outline:none;border-color:#e74c3c;box-shadow:0 0 8px rgba(231,76,60,.4);background:#331212}
        button,.admin-btn-small,.pin-btn,.ban-btn,.delete-user-btn,.delete-case-btn,.complain-btn,.edit-username-btn,.end-sess-btn,.close-modal,.close-admin,.status-change{background:#8b1a1a;border:1px solid #c0392b;color:#fff;font-weight:bold;padding:.7rem 1.2rem;border-radius:2rem;cursor:pointer;transition:.2s;font-size:.9rem;box-shadow:0 2px 5px #3a0000;width:100%;margin-top:.4rem;display:inline-flex;align-items:center;justify-content:center;gap:.3rem}
        button:hover,.admin-btn-small:hover,.pin-btn:hover,.ban-btn:hover,.delete-user-btn:hover,.delete-case-btn:hover,.complain-btn:hover,.edit-username-btn:hover,.end-sess-btn:hover,.close-modal:hover,.close-admin:hover,.status-change:hover{background:#c0392b;transform:scale(1.01);border-color:#e74c3c;box-shadow:0 4px 12px rgba(200,40,40,.5)}
        button:disabled{opacity:.5;cursor:not-allowed;transform:none;background:#5a1515}
        .admin-btn-small,.pin-btn,.ban-btn,.delete-user-btn,.delete-case-btn,.complain-btn,.edit-username-btn,.end-sess-btn,.status-change{width:auto;margin-top:0;padding:.4rem .8rem;font-size:.75rem}
        .cases-list{margin-top:.8rem;max-height:500px;overflow-y:auto;border-radius:1rem;padding:.2rem}
        .case-item{background:#1f0c0c;margin-bottom:.8rem;padding:.8rem;border-radius:1rem;border-left:4px solid #c0392b}
        .case-header{display:flex;justify-content:space-between;flex-wrap:wrap;align-items:baseline;margin-bottom:.4rem;gap:.4rem}
        .case-title{font-weight:bold;font-size:.95rem;color:#ffc5c5}
        .case-author{font-size:.65rem;background:#3a1818;padding:.2rem .5rem;border-radius:1rem;color:#ffaaaa;cursor:pointer}
        .case-goal,.case-desc,.case-reason{font-size:.75rem;margin:.3rem 0;color:#e0b0b0;line-height:1.3}
        .case-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.4rem;font-size:.65rem;flex-wrap:wrap;gap:.4rem}
        .case-status{font-size:.7rem;font-weight:bold;padding:.2rem .5rem;border-radius:1rem;display:inline-block}
        .status-solved{color:#6fbf6f;border-left:2px solid #6fbf6f;background:#1a2a1a}
        .status-unsolved{color:#e0a0a0;border-left:2px solid #c0392b;background:#2a1515}
        .status-inprogress{color:#f0b27a;border-left:2px solid #e67e22;background:#2a1a0f}
        .comments-toggle{background:#3a1818;border:1px solid #aa3a3a;color:#ffaaaa;padding:.2rem .8rem;margin-top:.4rem;font-size:.7rem;width:auto;display:inline-flex;align-items:center;gap:.4rem}
        .comments-toggle:hover{background:#c0392b;color:#fff}
        .comments-section{margin-top:.6rem;border-top:1px solid #7a2525;padding-top:.5rem;display:none}
        .comments-section.open{display:block}
        .comment-item{background:#2a1010;margin-bottom:.4rem;padding:.4rem .6rem;border-radius:.6rem;font-size:.7rem}
        .comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem;flex-wrap:wrap;gap:.4rem}
        .comment-user{display:flex;align-items:center;gap:.4rem;cursor:pointer}
        .comment-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;border:1px solid #c0392b}
        .comment-author{font-weight:bold;color:#ffaaaa}
        .comment-date{color:#a07070;font-size:.6rem}
        .comment-text{color:#e0c0c0;word-break:break-word}
        .delete-comment-btn{background:transparent;border:none;color:#cc8888;cursor:pointer;font-size:.6rem;padding:0 .3rem;margin:0;width:auto;box-shadow:none;margin-top:0}
        .delete-comment-btn:hover{background:transparent;color:#c0392b;transform:none}
        .add-comment-form{display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap}
        .add-comment-form textarea{flex:1;padding:.3rem .5rem;font-size:.7rem;margin-bottom:0;height:50px}
        .add-comment-form button{width:auto;padding:.3rem .8rem;margin-top:0;font-size:.7rem}
        .empty-message,.login-message{text-align:center;color:#cc8888;padding:1.5rem;font-style:italic;background:#2a1010;border-radius:1rem;margin:.5rem 0}
        hr{border-color:#7a2525;margin:.6rem 0}
        .info-note{font-size:.65rem;background:#2a0f0f;padding:.4rem;border-radius:1rem;text-align:center;color:#ffbbbb;margin-top:.6rem}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(30,5,5,.96);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:.8rem}
        .modal-content{background:#1f0a0a;border:2px solid #c0392b;border-radius:1.2rem;max-width:550px;width:100%;padding:1.2rem;box-shadow:0 20px 35px #5a000060;max-height:85vh;overflow-y:auto}
        .auth-tabs{display:flex;gap:.5rem;margin-bottom:.8rem}
        .tab-btn{flex:1;padding:.5rem;background:#2a0f0f;border-bottom:2px solid #7a2525;border-radius:.8rem .8rem 0 0;cursor:pointer;text-align:center;font-size:.85rem;font-weight:bold}
        .tab-btn.active{background:#4a1818;border-bottom-color:#e74c3c;color:#fff}
        .admin-panel-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:.8rem}
        .admin-panel{background:#1a0808;border:2px solid #c0392b;border-radius:1.2rem;width:100%;max-width:1000px;max-height:90vh;display:flex;flex-direction:column}
        .admin-header{padding:.8rem;border-bottom:2px solid #c0392b;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
        .admin-content{padding:.8rem;overflow-y:auto;flex:1}
        .user-list-item,.case-list-item{background:#2a0f0f;margin-bottom:.5rem;padding:.6rem;border-radius:.8rem;display:flex;flex-direction:column;gap:.5rem}
        @media(min-width:600px){.user-list-item,.case-list-item{flex-direction:row;justify-content:space-between;align-items:center}}
        .user-info,.case-info{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
        .profile-avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #c0392b;cursor:pointer}
        .search-result{background:#2a0f0f;padding:.5rem;margin-bottom:.5rem;border-radius:1rem;cursor:pointer;display:flex;align-items:center;gap:.5rem}
        .session-item{background:#2a0f0f;margin-bottom:.4rem;padding:.4rem;border-radius:.8rem;font-size:.7rem;border-left:3px solid #c0392b;color:#fff}
        .session-current{border-left-color:#ffaa66;background:#3a1818}
        .rank-text-owner{background:linear-gradient(135deg,#FFD700,#FFA500,#FF4500);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:bold}
        .rank-text-moderator{background:linear-gradient(135deg,#7B68EE,#9370DB,#BA55D3);-webkit-background-clip:text;background-clip:text;color:transparent}
        .rank-text-analyst{background:linear-gradient(135deg,#20B2AA,#3CB371,#2E8B57);-webkit-background-clip:text;background-clip:text;color:transparent}
        .rank-text-curator{background:linear-gradient(135deg,#00B4DB,#0083B0,#00CED1);-webkit-background-clip:text;background-clip:text;color:transparent}
        .pinned-badge{background:#8b2a2a;color:#ffd966;padding:.2rem .4rem;border-radius:1rem;font-size:.6rem;margin-left:.3rem;border-left:2px solid #ffaa66}
        .checkbox-label{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;cursor:pointer}
        .checkbox-label input{width:auto;margin-bottom:0}
        .id-copy{font-family:monospace;font-size:.7rem;background:#2a0f0f;padding:.2rem .4rem;border-radius:1rem;display:inline-block;cursor:pointer}
        .id-copy:hover{background:#c0392b}
        @media(max-width:480px){.mono-header{flex-direction:column;text-align:center}.card h2{font-size:1.1rem}button{padding:.5rem .8rem;font-size:.8rem}.profile-avatar{width:45px;height:45px}}

<body>
<div class="container">
    <div class="mono-header">
        <div class="logo"><h1>LEGITIVE INTERNET</h1><p>• Красный уровень доступа</p></div>
        <div class="rank-badge" id="globalRankDisplay">Гость</div>
    </div>
    <div class="grid-2col">
        <div class="card">
            <h2>МЕНЮ</h2>
            <div id="authArea"></div><hr>
            <div id="proposeButtonArea"><button id="openProposeModalBtn" disabled>ПРЕДЛОЖИТЬ КЕЙС</button></div>
            <div id="cabinetButtonArea"><button id="openCabinetBtn" style="display:none;">ЛИЧНЫЙ КАБИНЕТ</button></div>
            <div id="adminButtonArea"><button id="openAdminPanelBtn" style="display:none;">АДМИН ПАНЕЛЬ</button></div>
            <div id="telegramButtonArea"><button id="telegramBtn">НАШ TELEGRAM</button></div>
            <div id="supportButtonArea"><button id="supportBtn">ТЕХПОДДЕРЖКА</button></div>
            <div id="loggedInfo" style="margin-top:.6rem;font-size:.7rem;background:#2a0f0f;padding:.4rem;border-radius:1rem;"></div>
        </div>
        <div class="card">
            <h2>КЕЙСЫ</h2>
            <div id="casesContainer" class="cases-list"><div class="empty-message">Загрузка...</div></div>
            <div class="info-note">Нажмите на ник автора чтобы открыть профиль</div>
        </div>
    </div>
    <div class="card search-area"><h2>ПОИСК</h2><div id="searchBlock"></div></div>
    <footer style="text-align:center;margin-top:1.2rem;color:#b55a5a;font-size:.65rem;">© LEGITIVE INTERNET — Все права защищены!</footer>
</div>
<script>
// Глобальные переменные
let curIP = 'загрузка...', curSess = null, curUser = null;
const OWNER_HASH = "f7c3bc1d808e04732adf679965ccc34ca7ae344141a5c98f3f7b5c6c6b6b8b4c";

async function hashPass(pwd) {
    if(!pwd) return "";
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode(pwd));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function getIP() {
    try { const r=await fetch('https://api.ipify.org?format=json'); const d=await r.json(); return d.ip; } catch(e){ return '127.0.0.1'; }
}
async function logAct(act, uname, ok=true) {
    if(curIP==='загрузка...') curIP = await getIP();
    let logs = JSON.parse(localStorage.getItem("osint_logs")||'[]');
    logs.unshift({id:Date.now(), ts:new Date().toISOString(), ip:curIP, act, uname, ok});
    if(logs.length>300) logs.pop();
    localStorage.setItem("osint_logs", JSON.stringify(logs));
}
function getSess() { return JSON.parse(localStorage.getItem("osint_sessions")||'{}'); }
function saveSess(s) { localStorage.setItem("osint_sessions", JSON.stringify(s)); }
async function newSess(uid, username) {
    if(username === "DESPITE"){
        let sess = getSess();
        if(sess[uid]) delete sess[uid];
        saveSess(sess);
    }
    let sess = getSess();
    if(!sess[uid]) sess[uid] = [];
    const sid = Date.now() + '_' + Math.random().toString(36).substr(2,8);
    const ip = await getIP();
    const ua = navigator.userAgent;
    let dev = 'Unknown';
    if(ua.includes('Windows')) dev='Windows';
    else if(ua.includes('Mac')) dev='Mac';
    else if(ua.includes('Linux')) dev='Linux';
    else if(ua.includes('Android')) dev='Android';
    else if(ua.includes('iPhone')||ua.includes('iPad')) dev='iOS';
    sess[uid].push({sid, ip, ua, dev, loginTime:new Date().toISOString(), lastActive:new Date().toISOString()});
    saveSess(sess);
    return sid;
}
function killSess(uid, sid) { let sess = getSess(); if(sess[uid]) sess[uid] = sess[uid].filter(s=>s.sid!==sid); saveSess(sess); }
function getSessFor(uid) { return getSess()[uid] || []; }
function genUserId(users) { let newId, exists; do { newId = Math.floor(10000000 + Math.random() * 90000000).toString(); exists = users.some(u => u.userId === newId); } while (exists); return newId; }
function fixUserIds() {
    let users = JSON.parse(localStorage.getItem("osint_users")||'[]');
    let need = false;
    for(let u of users){
        if(!u.userId){
            let padded = u.id.toString().padStart(8, '0');
            let existing = users.some(x=>x.userId === padded);
            u.userId = existing ? genUserId(users) : padded;
            need = true;
        }
    }
    if(need) localStorage.setItem("osint_users", JSON.stringify(users));
}
function rankIcon(r) { if(r==='owner') return '👑'; if(r==='moderator') return '🛡️'; if(r==='analyst') return '🕵️'; if(r==='curator') return '🎓'; return '🔹'; }
function rankName(r) { if(r==='owner') return 'Владелец'; if(r==='moderator') return 'Модератор'; if(r==='analyst') return 'Аналитик'; if(r==='curator') return 'Куратор'; return 'Пользователь'; }
function rankHtml(r) { let cls=''; if(r==='owner') cls='rank-text-owner'; else if(r==='moderator') cls='rank-text-moderator'; else if(r==='analyst') cls='rank-text-analyst'; else if(r==='curator') cls='rank-text-curator'; return `${rankIcon(r)} <span class="${cls}">${rankName(r)}</span>`; }
function avatarUrl(uname) { let users = JSON.parse(localStorage.getItem("osint_users")||'[]'); let u = users.find(u=>u.username===uname); if(u && u.avatar) return u.avatar; return `https://ui-avatars.com/api/?name=${encodeURIComponent(uname)}&background=c0392b&color=fff&size=80&rounded=true&bold=true`; }
async function upAvatar(uid, uname) {
    let inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    inp.onchange=async(e)=>{
        let f=e.target.files[0];
        if(!f) return;
        if(f.size>2*1024*1024){ alert("Файл >2МБ"); return; }
        let rd=new FileReader();
        rd.onload=async(ev)=>{
            let dataUrl=ev.target.result;
            let users=JSON.parse(localStorage.getItem("osint_users")||'[]');
            let idx=users.findIndex(u=>u.id===uid);
            if(idx!==-1){
                users[idx].avatar=dataUrl;
                localStorage.setItem("osint_users", JSON.stringify(users));
                if(curUser && curUser.id===uid) curUser.avatar=dataUrl;
                await logAct("Аватар обновлён", uname, true);
                alert("Аватар обновлён");
                renderAuth(); renderCases(); updRank(); updSearch();
            }
        };
        rd.readAsDataURL(f);
    };
    inp.click();
}
async function renameUser(newName, user, modalToClose) {
    newName = newName.trim();
    if(newName === user.username) { alert("Новый ник совпадает"); return false; }
    if(!/^[a-zA-Z0-9_]+$/.test(newName)){ alert("Только латиница, цифры, _"); return false; }
    if(newName.toLowerCase() === "despite"){ alert("Ник зарезервирован"); return false; }
    let users = JSON.parse(localStorage.getItem("osint_users")||'[]');
    if(users.find(u=>u.username.toLowerCase() === newName.toLowerCase())){ alert("Ник занят"); return false; }
    let oldName = user.username;
    let idx = users.findIndex(u=>u.id===user.id);
    if(idx !== -1){
        users[idx].username = newName;
        localStorage.setItem("osint_users", JSON.stringify(users));
        let cases = JSON.parse(localStorage.getItem("osint_cases")||'[]');
        for(let c of cases) if(c.authorId === user.id && c.authorName === oldName) c.authorName = newName;
        localStorage.setItem("osint_cases", JSON.stringify(cases));
        if(curUser && curUser.id === user.id){ curUser.username = newName; localStorage.setItem("currentUserId", curUser.id); }
        await logAct(`Смена ника ${oldName} → ${newName}`, newName, true);
        alert("Ник изменён");
        if(modalToClose) modalToClose.remove();
        renderAuth(); renderCases(); updRank(); updSearch();
        return true;
    }
    return false;
}
function getCompl() { return JSON.parse(localStorage.getItem("osint_complaints")||'[]'); }
function saveCompl(c) { localStorage.setItem("osint_complaints", JSON.stringify(c)); }
async function addCompl(caseId, reason, fromId, fromName) {
    let compl = getCompl();
    if(compl.find(c => c.caseId === caseId && c.fromUserId === fromId && c.status === 'pending')) { alert("Вы уже жаловались"); return false; }
    compl.push({ id: Date.now(), caseId, reason, fromUserId: fromId, fromUsername: fromName, status: 'pending', createdAt: Date.now() });
    saveCompl(compl);
    await logAct(`Жалоба на кейс ${caseId}`, fromName, true);
    alert("Жалоба отправлена");
    return true;
}
async function resolveCompl(complId, action) {
    let compl = getCompl();
    let idx = compl.findIndex(c => c.id === complId);
    if(idx === -1) return;
    if(action === 'delete_case') {
        let caseId = compl[idx].caseId;
        let cases = JSON.parse(localStorage.getItem("osint_cases")||'[]');
        localStorage.setItem("osint_cases", JSON.stringify(cases.filter(c => c.id !== caseId)));
        await logAct(`Удаление кейса по жалобе #${caseId}`, curUser?.username, true);
        compl[idx].status = 'resolved_deleted';
        alert("Кейс удалён");
    } else if(action === 'reject') { compl[idx].status = 'rejected'; alert("Жалоба отклонена"); }
    saveCompl(compl);
    if(curUser && (curUser.rank === 'owner' || curUser.rank === 'moderator' || curUser.rank === 'curator')) showAdminContent();
    renderCases();
}

function getComments() {
    return JSON.parse(localStorage.getItem("osint_comments")||'{}');
}
function saveComments(comments) {
    localStorage.setItem("osint_comments", JSON.stringify(comments));
}
function getCommentCount(caseId) {
    let comments = getComments();
    return comments[caseId] ? comments[caseId].length : 0;
}
async function addComment(caseId, text) {
    if(!curUser) { alert("Войдите"); return false; }
    if(!text.trim()) { alert("Пустой комментарий"); return false; }
    let comments = getComments();
    if(!comments[caseId]) comments[caseId] = [];
    comments[caseId].push({
        id: Date.now(),
        authorId: curUser.id,
        authorName: curUser.username,
        text: text.trim(),
        createdAt: Date.now()
    });
    saveComments(comments);
    await logAct(`Комментарий к кейсу ${caseId}`, curUser.username, true);
    renderCases();
    return true;
}
async function deleteComment(caseId, commentId) {
    if(!curUser) return;
    let comments = getComments();
    if(!comments[caseId]) return;
    let comment = comments[caseId].find(c => c.id === commentId);
    if(!comment) return;
    let canDelete = (curUser.id === comment.authorId) || (curUser.rank === 'owner' || curUser.rank === 'moderator' || curUser.rank === 'curator');
    if(!canDelete) { alert("Недостаточно прав"); return; }
    comments[caseId] = comments[caseId].filter(c => c.id !== commentId);
    if(comments[caseId].length === 0) delete comments[caseId];
    saveComments(comments);
    await logAct(`Удаление комментария к кейсу ${caseId}`, curUser.username, true);
    renderCases();
}

function showCab() {
    if(!curUser){ alert("Войдите"); return; }
    let av = avatarUrl(curUser.username);
    let allSess = getSessFor(curUser.id);
    let currSess = allSess.find(s=>s.sid===curSess);
    let sessHtml = `<div><strong>ТЕКУЩАЯ СЕССИЯ:</strong><div class="session-item session-current">`;
    if(currSess) sessHtml += `<div>IP: ${escapeHtml(currSess.ip)}</div><div>Устройство: ${escapeHtml(currSess.dev)}</div><div>Вход: ${new Date(currSess.loginTime).toLocaleString()}</div>`;
    else sessHtml += `<div>Нет данных</div>`;
    sessHtml += `</div>`;
    let other = allSess.filter(s=>s.sid !== curSess);
    if(other.length){
        sessHtml += `<div><strong>ДРУГИЕ СЕССИИ (${other.length}):</strong>`;

            let author = JSON.parse(localStorage.getItem("osint_users")||'[]').find(u=>u.username === c.authorName);

            curSess=savedSess;

            if(!sess[curUser.id] || !sess[curUser.id].find(s=>s.sid===curSess)){ localStorage.removeItem("currentUserId"); localStorage.removeItem("currentSessionId"); curUser=null; curSess=null; }

async function registerUser() {
    let uname=document.getElementById('regUsername').value.trim();
    let pwd=document.getElementById('regPassword').value.trim();
    let conf=document.getElementById('regPasswordConfirm').value.trim();
    let bio=document.getElementById('regBio').value.trim()||"Новый пользователь";
    if(!uname||!pwd){ alert("Заполните ник и пароль"); return; }
    if(pwd!==conf){ alert("Пароли не совпадают"); return; }
    if(pwd.length<3){ alert("Минимум 3 символа"); return; }
    if(uname.toLowerCase()==='despite'){ alert("Ник зарезервирован"); return; }
    if(!/^[a-zA-Z0-9_]+$/.test(uname)){ alert("Только латинские буквы, цифры, _"); return; }
    let users=getUsers();
    if(users.find(u=>u.username.toLowerCase()===uname.toLowerCase())){ alert("Ник занят"); return; }
    let hashed=await hashPass(pwd);
    let newId=users.length?Math.max(...users.map(u=>u.id))+1:2;
    let newUserId = genUserId(users);
    users.push({id:newId, username:uname, password:hashed, rank:"user", createdAt:Date.now(), bio, banned:false, pinned:false, userId:newUserId});
    saveUsers(users);
    await logAct("Регистрация", uname, true);
    alert("Регистрация успешна! Войдите.");
    document.getElementById('loginUsername').value=uname;
    document.getElementById('loginForm').style.display='block';
    document.getElementById('registerForm').style.display='none';
}
async function loginUser() {
    let uname=document.getElementById('loginUsername').value.trim();
    let pwd=document.getElementById('loginPassword').value.trim();
    if(!uname){ alert("Введите ник"); return; }
    let users=getUsers();
    let hashed = pwd ? await hashPass(pwd) : "";
    let found = users.find(u => u.username === uname && u.password === hashed);
    if(!found){ alert("Неверные данные"); await logAct("Неудачный вход", uname, false); return; }
    if(found.banned){ alert("Аккаунт заблокирован"); return; }
    if(found.username === "DESPITE"){
        let sess = getSess();
        if(sess[found.id] && sess[found.id].length > 0){
            delete sess[found.id];
            saveSess(sess);
        }
    }
    let sid=await newSess(found.id, found.username);
    curSess=sid;
    curUser={id:found.id, username:found.username, rank:found.rank||'user', bio:found.bio, avatar:found.avatar, pinned:found.pinned, createdAt:found.createdAt, userId:found.userId};
    localStorage.setItem("currentUserId", found.id);
    localStorage.setItem("currentSessionId", sid);
    await logAct("Вход", uname, true);
    renderAuth(); renderCases(); updRank(); updSearch();
}
async function logoutUser() {
    if(curUser && curSess) killSess(curUser.id, curSess);
    curUser=null; curSess=null;
    localStorage.removeItem("currentUserId"); localStorage.removeItem("currentSessionId");
    renderAuth(); renderCases(); updRank(); updSearch();
}
function updRank() { let d=document.getElementById("globalRankDisplay"); d.innerHTML=!curUser?"Гость":rankHtml(curUser.rank); }
function canPost(uid) {
    if(curUser && curUser.rank === 'owner') return true;
    let last = localStorage.getItem(`last_post_${uid}`);
    if(!last) return true;
    return (Date.now() - parseInt(last)) >= 86400000;
}
function setPostTime(uid) { localStorage.setItem(`last_post_${uid}`, Date.now().toString()); }
function showPropose() {
    if(!curUser){ alert("Войдите"); return; }
    if(curUser.banned){ alert("Заблокированы"); return; }
    if(!canPost(curUser.id)){
        let last = localStorage.getItem(`last_post_${curUser.id}`);
        let next = new Date(parseInt(last) + 86400000);
        alert(`1 кейс в сутки. Следующий: ${next.toLocaleString()}`);
        return;
    }
    let modal=document.createElement('div'); modal.className='modal-overlay';
    modal.innerHTML=`<div class="modal-content"><h3>НОВЫЙ КЕЙС</h3><input type="text" id="caseGoal" placeholder="Цель *"><textarea id="caseDesc" rows="3" placeholder="Описание *"></textarea><textarea id="caseReason" rows="2" placeholder="Причина *"></textarea><label class="checkbox-label"><input type="checkbox" id="anonymousCheck"> Анонимно</label><button id="submitCase">ОПУБЛИКОВАТЬ</button><button id="cancelCase" class="close-modal">ОТМЕНА</button></div>`;
    document.body.appendChild(modal);
    document.getElementById('submitCase').onclick=async()=>{
        let goal=document.getElementById('caseGoal').value.trim();
        let desc=document.getElementById('caseDesc').value.trim();
        let reason=document.getElementById('caseReason').value.trim();
        let anon = document.getElementById('anonymousCheck').checked;
        if(!goal||!desc||!reason){ alert("Заполните все поля"); return; }
        let cases=getCases();
        let newId=cases.length?Math.max(...cases.map(c=>c.id))+1:200;
        let displayName = anon ? "Аноним" : curUser.username;
        cases.push({ id:newId, goal, description:desc, reason, authorId:curUser.id, authorName:displayName, anonymous:anon, createdAt:Date.now(), status:"unsolved" });
        saveCases(cases);
        if(curUser.rank !== 'owner') setPostTime(curUser.id);
        await logAct("Добавление кейса", curUser.username, true);
        renderCases();
        modal.remove();
        alert("Кейс добавлен! "+(curUser.rank !== 'owner'?"Следующий через 24 часа.":""));
    };
    document.getElementById('cancelCase').onclick=()=>modal.remove();
    modal.onclick=(e)=>{if(e.target===modal) modal.remove();};
}
async function delCase(cid) {
    if(!curUser) return;
    if(!['owner','moderator','curator'].includes(curUser.rank)){ alert("Недостаточно прав"); return; }
    let cases=getCases();
    let newc=cases.filter(c=>c.id!==cid);
    if(newc.length===cases.length) return;
    saveCases(newc);
    await logAct("Удаление кейса", curUser.username, true);
    renderCases();
}
async function changeStatus(cid, newStatus) {
    let cases=getCases();
    let idx = cases.findIndex(c=>c.id===cid);
    if(idx===-1) return;
    cases[idx].status = newStatus;
    saveCases(cases);
    await logAct(`Изменение статуса кейса ${cid} на ${newStatus}`, curUser?.username, true);
    renderCases();
}
function statusText(st) {

}

}
async function togglePin(uid, cur, uname) { let users=getUsers(); let idx=users.findIndex(u=>u.id===uid); if(idx===-1) return; users[idx].pinned=!cur; saveUsers(users); await logAct(`${cur?"Открепление":"Закрепление"} ${uname}`, curUser?.username, true); alert(`Профиль ${uname} ${cur?"откреплён":"закреплён"}`); if(curUser && curUser.id===uid) curUser.pinned=!cur; document.querySelector('.admin-panel-overlay')?.remove(); showAdminContent(); updSearch(); }
async function toggleBan(uid, cur, uname) { let users=getUsers(); let idx=users.findIndex(u=>u.id===uid); if(idx===-1) return; users[idx].banned=!cur; saveUsers(users); if(curUser && curUser.id===uid) curUser.banned=!cur; await logAct(`${cur?"Разблокировка":"Блокировка"} ${uname}`, curUser?.username, true); alert(`Пользователь ${uname} ${cur?"разблокирован":"заблокирован"}`); document.querySelector('.admin-panel-overlay')?.remove(); showAdminContent(); }
async function deleteUserForever(uid, uname) { if(!confirm(`УДАЛИТЬ НАВСЕГДА ${uname} и все его кейсы?`)) return; let users=getUsers(); let cases=getCases(); let user=users.find(u=>u.id===uid); if(!user) return; if(user.username==="DESPITE"){ alert("Нельзя удалить владельца"); return; } saveUsers(users.filter(u=>u.id!==uid)); saveCases(cases.filter(c=>c.authorId!==uid)); let sess=getSess(); delete sess[uid]; saveSess(sess); await logAct(`ПОЛНОЕ УДАЛЕНИЕ ${uname}`, curUser?.username, true); alert(`Пользователь ${uname} удалён`); if(curUser && curUser.id===uid) await logoutUser(); document.querySelector('.admin-panel-overlay')?.remove(); showAdminContent(); renderCases(); if(curUser && curUser.id!==uid){ renderAuth(); updRank(); updSearch(); } }
function showAdminContent() {
    if(!curUser || !['owner','moderator','curator'].includes(curUser.rank)){ alert("Недостаточно прав"); return; }
    let users=getUsers(); let logs = JSON.parse(localStorage.getItem("osint_logs")||'[]'); let complaints = getCompl(); let cases = getCases();
    let panel=document.createElement('div'); panel.className='admin-panel-overlay';
    let usersHtml='';
    users.forEach(u=>{ let banned=u.banned||false; let pinned=u.pinned||false;
        usersHtml+=`<div class="user-list-item"><div class="user-info"><img src="${avatarUrl(u.username)}" style="width:35px;height:35px;border-radius:50%;"><div><strong>${escapeHtml(u.username)}</strong> ${banned?'<span class="pinned-badge">ЗАБЛОКИРОВАН</span>':''} ${pinned?'<span class="pinned-badge">ЗАКРЕПЛЁН</span>':''}<div>ID:${escapeHtml(u.userId)} | ${new Date(u.createdAt).toLocaleDateString()}</div></div></div><div style="display:flex; gap:0.3rem; flex-wrap:wrap;"><select id="rank_${u.id}"><option value="user" ${(u.rank||'user')==='user'?'selected':''}>Пользователь</option><option value="analyst" ${u.rank==='analyst'?'selected':''}>Аналитик</option><option value="moderator" ${u.rank==='moderator'?'selected':''}>Модератор</option><option value="curator" ${u.rank==='curator'?'selected':''}>Куратор</option><option value="owner" ${u.rank==='owner'?'selected':''}>Владелец</option></select><button class="admin-btn-small" data-id="${u.id}">Ранг</button><button class="pin-btn" data-id="${u.id}" data-pinned="${pinned}">${pinned?'ОТКРЕПИТЬ':'ЗАКРЕПИТЬ'}</button><button class="ban-btn" data-id="${u.id}" data-banned="${banned}">${banned?'РАЗБЛОКИРОВАТЬ':'ЗАБЛОКИРОВАТЬ'}</button><button class="delete-user-btn" data-id="${u.id}">УДАЛИТЬ</button></div></div>`;
    });
    let casesHtml = '';
    cases.forEach(c=>{
        casesHtml+=`<div class="case-list-item"><div class="case-info"><strong>${escapeHtml(c.goal)}</strong> | Автор: ${escapeHtml(c.authorName)} | Текущий статус: ${statusText(c.status)}</div><div><select id="status_${c.id}"><option value="unsolved" ${c.status==='unsolved'?'selected':''}>❌ Не решён</option><option value="inprogress" ${c.status==='inprogress'?'selected':''}>⚙ В работе</option><option value="solved" ${c.status==='solved'?'selected':''}>✅ Решён</option></select><button class="admin-btn-small status-change" data-id="${c.id}">Сменить статус</button></div></div>`;
    });
    let pending = complaints.filter(c => c.status === 'pending');
    let compHtml = pending.length ? pending.map(c=>`<div class="user-list-item" style="border-left:3px solid #ffaa66;"><div><strong>Жалоба на кейс #${c.caseId}</strong><br>От: ${escapeHtml(c.fromUsername)}<br>Причина: ${escapeHtml(c.reason)}</div><div style="display:flex; gap:0.3rem;"><button class="admin-btn-small" data-compl="${c.id}" data-act="delete_case">Удалить кейс</button><button class="admin-btn-small" data-compl="${c.id}" data-act="reject">Отклонить</button></div></div>`).join('') : '<div class="empty-message">Нет жалоб</div>';
    let logsHtml=logs.slice(0,50).map(l=>`<div style="padding:0.2rem; border-bottom:1px solid #3a1515; font-size:0.65rem;"><span style="color:#ff8888;">[${new Date(l.ts).toLocaleString()}]</span> 🌐 ${escapeHtml(l.ip)} ${l.ok?'✅':'❌'} ${escapeHtml(l.act)} @${escapeHtml(l.uname)}</div>`).join('');
    panel.innerHTML=`<div class="admin-panel"><div class="admin-header"><h2>АДМИН ПАНЕЛЬ</h2><button id="closeAdmin" class="close-admin">✖</button></div><div class="admin-content"><div class="admin-section"><h3>ЖАЛОБЫ (${pending.length})</h3>${compHtml}</div><div class="admin-section"><h3>УПРАВЛЕНИЕ КЕЙСАМИ (статусы)</h3>${casesHtml||'<div>Нет кейсов</div>'}</div><div class="admin-section"><h3>ПОЛЬЗОВАТЕЛИ</h3>${usersHtml}</div><div class="admin-section"><h3>ЛОГИ ВСЕХ ПОЛЬЗОВАТЕЛЕЙ</h3><div style="max-height:250px; overflow:auto;">${logsHtml||'Пусто'}</div><button id="clearLogs">ОЧИСТИТЬ ЛОГИ</button></div></div></div>`;
    document.body.appendChild(panel);
    document.getElementById('closeAdmin').onclick=()=>panel.remove();
    document.getElementById('clearLogs').onclick=async()=>{ if(confirm('Очистить логи?')){ localStorage.setItem('osint_logs','[]'); await logAct("Очистка логов", "admin", true); panel.remove(); alert("Логи очищены"); } };
    document.querySelectorAll('[data-compl]').forEach(btn=>{ btn.onclick=async()=>{ await resolveCompl(parseInt(btn.dataset.compl), btn.dataset.act); panel.remove(); showAdminContent(); }; });
    document.querySelectorAll('.status-change').forEach(btn=>{
        btn.onclick=async()=>{ let cid=parseInt(btn.dataset.id); let newStatus=document.getElementById(`status_${cid}`).value; await changeStatus(cid, newStatus); panel.remove(); showAdminContent(); };
    });
    document.querySelectorAll('[data-id]').forEach(btn=>{
        if(btn.classList.contains('pin-btn')) btn.onclick=async()=>{ let uid=parseInt(btn.dataset.id); let uname=users.find(u=>u.id===uid)?.username; await togglePin(uid, btn.dataset.pinned==='true', uname); };
        else if(btn.classList.contains('ban-btn')) btn.onclick=async()=>{ let uid=parseInt(btn.dataset.id); let uname=users.find(u=>u.id===uid)?.username; await toggleBan(uid, btn.dataset.banned==='true', uname); };
        else if(btn.classList.contains('delete-user-btn')) btn.onclick=async()=>{ let uid=parseInt(btn.dataset.id); let uname=users.find(u=>u.id===uid)?.username; await deleteUserForever(uid, uname); };
        else if(btn.classList.contains('admin-btn-small') && !btn.dataset.compl && !btn.classList.contains('status-change')){
            btn.onclick=async()=>{
                let uid=parseInt(btn.dataset.id);
                let newRank=document.getElementById(`rank_${uid}`).value;
                let ul=getUsers();
                let idx=ul.findIndex(u=>u.id===uid);
                if(idx===-1) return;
                if(ul[idx].username==="DESPITE" && newRank!=='owner'){ alert("Нельзя понизить владельца"); return; }
                ul[idx].rank=newRank;
                saveUsers(ul);
                if(curUser && curUser.id===uid) curUser.rank=newRank;
                await logAct(`Изменение ранга ${ul[idx].username} → ${rankName(newRank)}`, curUser?.username, true);
                alert("Ранг сохранён");
                panel.remove();
                showAdminContent();
                renderAuth(); updRank(); updSearch();
            };
        }
    });
    panel.onclick=(e)=>{if(e.target===panel) panel.remove();};
}
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
init();
</script>
